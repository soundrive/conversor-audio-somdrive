name: Gerar Conversor SomDrive Windows

on:
  workflow_dispatch:
  push:
    paths:
      - "somdrive-desktop/**"
      - ".github/workflows/build-somdrive-desktop.yml"

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: somdrive-desktop

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: somdrive-desktop/package-lock.json

      - name: Configurar Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Instalar dependências
        run: npm ci

      - name: Baixar FFmpeg e FFprobe
        shell: powershell
        run: npm run prepare:ffmpeg

      - name: Verificar TypeScript
        run: npm run typecheck

      - name: Compilar frontend
        run: npm run build

      - name: Compilar aplicativo Windows
        run: npm run tauri:build

      - name: Salvar instalador
        uses: actions/upload-artifact@v4
        with:
          name: Conversor-SomDrive-Windows
          path: |
            somdrive-desktop/src-tauri/target/release/bundle/nsis/*.exe
            somdrive-desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 30
